name: ZAP Full Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:dind
        privileged: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image for Flask app
        run: docker build -t flask-vuln-app .

      - name: Run Flask app container
        run: docker run -d -p 5000:5000 --name flask-vuln-app flask-vuln-app

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000 | grep -q .; then
              echo "App is up"
              break
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done

      - name: Create reports directory
        run: mkdir -p zap-reports

      - name: Run OWASP ZAP Full Scan
        run: |
          docker run --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:latest zap-full-scan.py \
            -t http://localhost:5000 \
            -J /zap/wrk/zap_full_report.json \
            -r /zap/wrk/zap_full_report.html \
            -j -a -m 10 -T 30 \
            -z "-addoninstallall -config scanner.attackOnStart=true \
                -config spider.maxDepth=10 -config spider.threadCount=5 \
                -config ascan.maxRuleDurationInMins=5 \
                -config ascan.rulesAlpha=true -config ascan.rulesBeta=true \
                -config ascan.delayInMs=0"

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v3
        with:
          name: zap-reports
          path: zap-reports


