name: OWASP ZAP Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ZAP Baseline Scan (Full Docker)
        run: |
          docker run \
            -v $(pwd):/zap/wrk \
            owasp/zap2docker-stable \
            zap-baseline.py \
              -t https://example.com \
              -J zap.json \
              -r zap.html

      - name: Convert ZAP JSON to SARIF
        run: |
          docker run \
            -v $(pwd):/zap/wrk \
            owasp/zap2docker-stable \
            python /zap/zap-json-sarif.py zap.json -o zap.sarif

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v5
        with:
          name: zap-sarif
          path: zap.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap.sarif


