name: Nuclei Scan

on:
  push:
  pull_request:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nuclei
        run: |
          curl -s https://api.github.com/repos/projectdiscovery/nuclei/releases/latest \
          | grep browser_download_url \
          | grep linux_amd64.zip \
          | cut -d '"' -f 4 \
          | wget -qi -
          unzip -o nuclei*.zip
          sudo mv nuclei /usr/local/bin/

      - name: Install SARIF converter
        run: pip install nuclei-sarif

      - name: Run FAST Nuclei scan (JSON output)
        run: |
          nuclei \
            -u https://example.com \
            -json -o nuclei.json \
            -tags cve,exposure,fast \
            -exclude-tags fuzz,dns,ssl \
            -c 30 \
            -timeout 5 \
            -rate-limit 150

      - name: Convert JSON → SARIF
        run: nuclei-sarif nuclei.json nuclei.sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: nuclei.sarif


