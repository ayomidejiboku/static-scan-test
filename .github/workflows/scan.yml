name: OWASP ZAP Full Scan

on:
  push:
  pull_request:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    env:
      APP_NAME: flask-vuln-app
      ZAP_IMAGE: ghcr.io/zaproxy/zaproxy:latest
      ZAP_TARGET: http://localhost:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Flask app Docker image
        run: docker build -t $APP_NAME .

      - name: Run Flask app container
        run: docker run -d -p 5000:5000 --name $APP_NAME $APP_NAME

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s $ZAP_TARGET | grep "Welcome"; then
              echo "App is up"
              break
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done

      - name: Create report directory
        run: mkdir -p zap-reports

      - name: Run OWASP ZAP Full Scan
        run: |
          docker run --network host \
            -v "$GITHUB_WORKSPACE/zap-reports:/zap/wrk/:rw" \
            $ZAP_IMAGE zap-full-scan.py \
            -t "$ZAP_TARGET" \
            -J /zap/wrk/zap_full_report.json \
            -r /zap/wrk/zap_full_report.html \
            -j -a -m 10 -T 30 \
            -z "-addoninstallall \
                -config scanner.attackOnStart=true \
                -config spider.maxDepth=10 \
                -config spider.threadCount=5 \
                -config ascan.maxRuleDurationInMins=5 \
                -config ascan.rulesAlpha=true \
                -config ascan.rulesBeta=true \
                -config ascan.delayInMs=0 \
                -config scanner.excludedParameters.default=CSRFToken" || true

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-scan-reports
          path: zap-reports/
          retention-days: 7

  cleanup:
    runs-on: ubuntu-latest
    needs: zap_scan
    if: always()

    steps:
      - name: Cleanup Docker containers and images
        run: |
          docker rm -f flask-vuln-app || true
          docker image rm flask-vuln-app || true



