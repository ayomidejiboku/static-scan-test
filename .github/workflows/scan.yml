name: Semgrep Static Scan

on:
  push:
  pull_request:

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install latest Semgrep
        run: curl -sL https://semgrep.dev/install.sh | sh

      - name: Run Semgrep
        run: semgrep ci --config p/default --verbose





