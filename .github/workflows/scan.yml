name: ZAP Baseline Scan

on:
  push:
  pull_request:

jobs:
  zap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start app
        run: |
          docker compose up -d
          sleep 10

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:8080"
          

