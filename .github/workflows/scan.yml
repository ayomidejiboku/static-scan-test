name: OWASP ZAP Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "https://example.com"
          cmd_options: "-a"
          allow_issue_writing: false



