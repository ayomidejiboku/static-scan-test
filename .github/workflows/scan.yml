name: Semgrep Static Scan

on:
  push:
  pull_request:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep:latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: semgrep scan --config p/ci --verbose --max-target-bytes 0 --no-semgrepignore


